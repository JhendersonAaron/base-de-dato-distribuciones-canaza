name: canaza-bi-dw

services:
  postgres-canaza-dw:
    image: postgres:16
    container_name: canaza-dw-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canaza_dw
      TZ: America/Lima
    ports:
      - "15432:5432"
    volumes:
      - postgres_canaza_dw_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - canaza-bi-net

volumes:
  postgres_canaza_dw_data:

networks:
  canaza-bi-net:
    external: true
    name: canaza-bi-net