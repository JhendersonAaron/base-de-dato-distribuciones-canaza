name: canaza-bi-oltp

services:
  mysql-canaza:
    image: mysql:8.4
    container_name: canaza-oltp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canaza_oltp
      TZ: America/Lima
    ports:
      - "13306:3306"
    volumes:
      - mysql_canaza_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - canaza-bi-net

volumes:
  mysql_canaza_data:

networks:
  canaza-bi-net:
    name: canaza-bi-net